<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nostalgia: Post-IT - To Do List</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <header>
      <h1>Post-IT - To Do List</h1>
      <button id="theme-toggle">☀️</button>
    </header>
    <div id="board" class="board">
      <div class="column">
        <div class="column-header">
          <h2>Post-It</h2>
          <span class="delete-column">🗑️</span>
        </div>
        <div class="card" contenteditable="true">New Post-It<span class="delete-card">🗑️</span></div>
        <button class="add-card">Add Card</button>
      </div>
      <div class="todo">
        <div class="todo-header">
          <h2>To-Do List ORIG</h2>
          <span class="delete-todo">🗑️</span>
        </div>
        <div class="task">
          <input type="checkbox" /><span contenteditable="">Task 1</span
          ><span class="delete-card">🗑️</span>
        </div>
        <button class="add-task">Add Task</button>
      </div>
      <div class="todo">
        <div class="todo-header">
          <h2>To-Do List</h2>
          <span class="delete-todo">🗑️</span>
        </div>
        <div class="task"><input type="checkbox"><span contenteditable="">Task 1</span><span class="delete-task">🗑️</span></div>
        <button class="add-task">Add Task</button>
      </div>
    </div>
    <button id="add-column">Add Post-IT</button>
    <button id="add-todo">Add To Do List</button>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="home.js"></script>
  </body>
</html>
